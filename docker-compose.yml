services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: api_processor
      DB_USERNAME: api_processor
      DB_PASSWORD: api_processor
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: api_processor
      MYSQL_USER: api_processor
      MYSQL_PASSWORD: api_processor
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapi_processor", "-papi_processor"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  vendor-data:
